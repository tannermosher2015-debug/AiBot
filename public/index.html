<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valley Isle Realty — Maui Homes</title>
    <style>
      :root {
        --navy: #0f2942;
        --navy-2: #163a5f;
        --accent: #e08a3c;
        --bg: #f4f1ea;
        --bubble-user: #163a5f;
        --bubble-bot: #ffffff;
        --line: #e3ddd0;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--navy);
        min-height: 100vh;
      }
      /* Fake site backdrop so the demo looks embedded on a real page */
      header {
        background: var(--navy);
        color: #fff;
        padding: 18px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header .brand { font-weight: 700; font-size: 20px; letter-spacing: 0.3px; }
      header .brand span { color: var(--accent); }
      header nav a {
        color: #cdd6e0; text-decoration: none; margin-left: 24px; font-size: 14px;
      }
      .hero {
        padding: 70px 32px;
        max-width: 760px;
      }
      .hero h1 { font-size: 42px; line-height: 1.1; margin-bottom: 16px; }
      .hero p { font-size: 18px; color: #4a5b6b; max-width: 540px; }

      /* Chat widget */
      .chat {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: 380px;
        max-width: calc(100vw - 32px);
        height: 560px;
        max-height: calc(100vh - 48px);
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 18px 50px rgba(15, 41, 66, 0.28);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--line);
      }
      .chat-head {
        background: var(--navy);
        color: #fff;
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .avatar {
        width: 40px; height: 40px; border-radius: 50%;
        background: var(--accent); color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 16px;
      }
      .chat-head .who { font-weight: 600; font-size: 15px; }
      .chat-head .status { font-size: 12px; color: #9fd1a6; display: flex; align-items: center; gap: 5px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #5fd06f; }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: var(--bg);
      }
      .msg { max-width: 80%; padding: 10px 13px; border-radius: 14px; font-size: 14px; line-height: 1.4; }
      .msg.bot { background: var(--bubble-bot); color: var(--navy); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
      .msg.user { background: var(--bubble-user); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
      .typing { align-self: flex-start; display: flex; gap: 4px; padding: 12px 14px; background: #fff; border-radius: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
      .typing span { width: 7px; height: 7px; border-radius: 50%; background: #b9c2cc; animation: blink 1.2s infinite; }
      .typing span:nth-child(2) { animation-delay: 0.2s; }
      .typing span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
      .composer { display: flex; padding: 12px; gap: 8px; border-top: 1px solid var(--line); background: #fff; }
      .composer input {
        flex: 1; border: 1px solid var(--line); border-radius: 10px;
        padding: 11px 13px; font-size: 14px; outline: none;
      }
      .composer input:focus { border-color: var(--accent); }
      .composer button {
        background: var(--accent); color: #fff; border: none;
        border-radius: 10px; padding: 0 18px; font-weight: 600; cursor: pointer; font-size: 14px;
      }
      .composer button:disabled { opacity: 0.5; cursor: default; }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">Valley Isle<span>Realty</span></div>
      <nav>
        <a href="#">Buy</a><a href="#">Sell</a><a href="#">Listings</a><a href="#">About</a>
      </nav>
    </header>

    <section class="hero">
      <h1>Find your next home on Maui.</h1>
      <p>Browse listings, get a free home valuation, or talk to an agent right now. (This is a demo backdrop — the chat widget in the corner is the real thing.)</p>
    </section>

    <div class="chat">
      <div class="chat-head">
        <div class="avatar" id="avatar">JR</div>
        <div>
          <div class="who" id="who">Jordan Rivera</div>
          <div class="status"><span class="dot"></span> Usually replies instantly</div>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <form class="composer" id="composer">
        <input id="input" type="text" placeholder="Type your message…" autocomplete="off" />
        <button id="send" type="submit">Send</button>
      </form>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const form = document.getElementById("composer");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("send");

      // Canonical conversation state (sent to the server each turn).
      let history = [];

      function addBubble(text, who) {
        const div = document.createElement("div");
        div.className = "msg " + who;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function showTyping() {
        const t = document.createElement("div");
        t.className = "typing";
        t.id = "typing";
        t.innerHTML = "<span></span><span></span><span></span>";
        messagesEl.appendChild(t);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      function hideTyping() {
        document.getElementById("typing")?.remove();
      }

      // Cosmetic welcome (not part of the model conversation).
      addBubble(
        "👋 Aloha! You've reached Jordan Rivera's team at Valley Isle Realty. Are you looking to buy or sell on Maui? I can help right now.",
        "bot"
      );

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        addBubble(text, "user");
        history.push({ role: "user", content: text });
        input.value = "";
        sendBtn.disabled = true;
        showTyping();

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: history }),
          });
          const data = await res.json();
          hideTyping();

          if (data.error) {
            addBubble("⚠️ " + data.error, "bot");
          } else {
            history = data.messages; // adopt server's full history (keeps tool blocks)
            addBubble(data.reply, "bot");
          }
        } catch (err) {
          hideTyping();
          addBubble("⚠️ Connection error. Is the server running?", "bot");
        } finally {
          sendBtn.disabled = false;
          input.focus();
        }
      });
    </script>
  </body>
</html>
